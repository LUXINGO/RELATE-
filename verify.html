<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 30px 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 50px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 10px 0;
      font-size: 22px;
    }

    p {
      color: #cbd5f5;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .plan {
      background: #334155;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    button {
      background: #25D366;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1ebe5d;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="icon">🎉</div>

    <h2>Payment Successful</h2>
    <p>Your payment has been received successfully.</p>

    <div class="plan" id="planText"></div>

    <button onclick="goWhatsApp()">
      Verify on WhatsApp
    </button>

    <div class="footer">
      Complete verification to activate your business profile
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const plan = urlParams.get("plan") || "Basic";

    document.getElementById("planText").innerText =
      "Plan: " + plan.toUpperCase();

    function goWhatsApp() {
      window.location.href =
        `https://wa.me/2348038684515?text=Hello I have paid for ${plan} plan on RELATE. Please verify me`;
    }
  </script>

</body>
</html>
